<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- Google Fonts — Preconnect for performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Page title — overridden per-page by react-helmet-async -->
    <title>LabelAlly Entertainment</title>

    <!-- Meta description — overridden per-page by react-helmet-async -->
    <meta
      name="description"
      content="LabelAlly Entertainment — a full-service music industry partner for artists, labels, and brands."
    />

    <!-- Theme color — matches brand light background; dark set via theme boot -->
    <meta name="theme-color" content="#FCFCFF" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0B0F19" media="(prefers-color-scheme: dark)" />

    <!-- Prevent incorrect-theme flash during initial load -->
    <script>
      (function() {
        const savedTheme = localStorage.getItem('theme');
        const systemPrefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        const isDark = savedTheme === 'dark' || (!savedTheme && systemPrefersDark);
        const root = document.documentElement;
        if (isDark) {
          root.classList.add('dark');
          root.setAttribute('data-theme', 'dark');
          root.style.colorScheme = 'dark';
        } else {
          root.classList.remove('dark');
          root.setAttribute('data-theme', 'light');
          root.style.colorScheme = 'light';
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
